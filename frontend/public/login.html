<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartVest — Safety System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d1f33;
        --bg-elevated: #142d4c;
        --border: rgba(255, 255, 255, 0.1);
        --text: #e0f0ff;
        --muted: #a3c2e0;
        --accent: #4dabf7;
        --accent-hover: #76c1ff;
        --accent-active: #3390e6;
        --danger: #ff6b6b;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
      }

      body {
        font-family: "DM Sans", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      .panel-left {
        flex: 0 0 55%;
        max-width: 55%;
        background: var(--bg);
        padding: clamp(1.5rem, 4vw, 3rem);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: auto;
      }

      .panel-left::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
            ellipse 80% 50% at 20% 0%,
            rgba(77, 171, 247, 0.06),
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 40% at 100% 100%,
            rgba(118, 193, 255, 0.08),
            transparent 50%
          );
        pointer-events: none;
      }

      .panel-inner {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 2.75rem;
      }

      .brand-icon {
        font-size: 1.75rem;
        line-height: 1;
      }

      .brand-name {
        font-weight: 700;
        font-size: 1.35rem;
        letter-spacing: -0.02em;
      }

      h1 {
        font-size: clamp(1.65rem, 3.5vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.2;
        margin: 0 0 0.65rem;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
        margin: 0 0 2.25rem;
      }

      .form-group {
        margin-bottom: 1.15rem;
      }

      label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 0.45rem;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.85rem 1rem;
        font-family: inherit;
        font-size: 1rem;
        color: var(--text);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease,
          background 0.2s ease, transform 0.15s ease;
      }

      input[type="email"]::placeholder,
      input[type="password"]::placeholder {
        color: rgba(163, 194, 224, 0.55);
      }

      input[type="email"]:hover,
      input[type="password"]:hover {
        border-color: rgba(118, 193, 255, 0.4);
        background: #0f355a;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: rgba(77, 171, 247, 0.8);
        box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15);
      }

      .error-msg {
        font-size: 0.875rem;
        color: var(--danger);
        margin: 0 0 1rem;
        min-height: 1.25em;
      }

      .btn-signin {
        width: 100%;
        margin-top: 0.35rem;
        padding: 0.95rem 1.25rem;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        color: #ffffff;
        background: var(--accent);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease,
          box-shadow 0.2s ease;
      }

      .btn-signin:hover:not(:disabled) {
        background: var(--accent-hover);
        box-shadow: 0 8px 24px rgba(77, 171, 247, 0.22);
        transform: translateY(-1px);
      }

      .btn-signin:active:not(:disabled) {
        background: var(--accent-active);
        transform: translateY(0);
      }

      .btn-signin:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .panel-right {
        flex: 0 0 45%;
        max-width: 45%;
        position: relative;
        min-height: 320px;
        background-color: #142d4c;
        background-image: url("./robot.png");
        background-position: right center;
        background-repeat: no-repeat;
        background-size: 99%;
      }

      .panel-right::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        pointer-events: none;
      }

      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
        }

        .panel-left,
        .panel-right {
          flex: 1 1 auto;
          max-width: 100%;
        }

        .panel-right {
          min-height: 240px;
          order: -1;
        }

        .panel-inner {
          padding: 1rem 0 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="panel-left" aria-label="Sign in">
        <div class="panel-inner">
          <div class="brand">
            <span class="brand-icon" aria-hidden="true">🦺</span>
            <span class="brand-name">SmartVest</span>
          </div>
          <h1>Welcome Back!</h1>
          <p class="subtitle">Monitor your workers and stay updated</p>

          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                placeholder="you@company.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </div>
            <p class="error-msg" id="error-msg" role="alert"></p>
            <button type="submit" class="btn-signin" id="btn-signin">
              Log in
            </button>
          </form>
        </div>
      </section>

      <div
        class="panel-right"
        role="img"
        aria-label="SmartVest safety illustration"
      ></div>
    </div>

    <script>
      (function () {
        const form = document.getElementById("login-form");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const errorEl = document.getElementById("error-msg");
        const btn = document.getElementById("btn-signin");

        const LOGIN_URL = "http://localhost:3000/api/auth/login";

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          errorEl.textContent = "";

          const email = emailInput.value.trim();
          const password = passwordInput.value;

          if (!email || !password) {
            errorEl.textContent = "Please enter your email and password.";
            return;
          }

          btn.disabled = true;
          try {
            const res = await fetch(LOGIN_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json().catch(function () {
              return {};
            });

            if (!res.ok) {
              errorEl.textContent =
                data.error || data.message || "Sign in failed. Try again.";
              return;
            }

            if (data.token) {
              localStorage.setItem("sv_token", data.token);
            }
            if (data.user) {
              localStorage.setItem("sv_user", JSON.stringify(data.user));
            }

            window.location.href = "dashboard.html";
          } catch (err) {
            errorEl.textContent =
              "Could not reach the server. Is the API running on port 3000?";
          } finally {
            btn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
