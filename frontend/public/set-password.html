<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartVest — Set Admin Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #0a3d62, #3c6382);
    margin: 0;
    color: #f0f0f0;
    display: block;
    height: auto;    
    overflow: hidden;      
    padding: 50px 0;
    position: relative;
  }

    .container {
      background: rgba(0, 0, 0, 0.6);
      padding: 2.5rem;
      border-radius: 15px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
      margin: 0 auto; /* محاذاة عرضية للوسط */
      position: relative;
    }

    .helmet-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #f39c12;
    }

    h1 {
      margin-bottom: 1.5rem;
      font-weight: 700;
      color: #f1c40f;
    }

    label {
      display: block;
      margin: 0.5rem 0 0.25rem;
      font-weight: 500;
      color: #dfe6e9;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 0.85rem;
      margin-bottom: 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #f0f0f0;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #f1c40f;
      background: rgba(255,255,255,0.1);
    }

    button {
      width: 100%;
      padding: 1rem;
      background: #f1c40f;
      color: #0a3d62;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #f39c12;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    }

    .error {
      color: #e74c3c;
      min-height: 0.5em;
      margin-bottom: 0.1rem;
    }

    .success {
      color: #2ecc71;
      min-height: 0.5em;
      margin-bottom: 0.1rem;
    }

    /* Decorative background circles */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: rgba(241, 196, 15, 0.1);
      border-radius: 50%;
      top: -200px;
      left: -200px;
      z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(46, 204, 113, 0.1);
      border-radius: 50%;
      bottom: -150px;
      right: -150px;
      z-index: 0;
    }

    .container * {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="helmet-icon">🦺</div>
    <h1>SmartVest Admin Setup</h1>

    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="••••••••" required>

    <label for="confirm-password">Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="••••••••" required>

    <button id="btn-submit">Set Password</button>
    <p class="error" id="error-msg"></p>
    <p class="success" id="success-msg"></p>
  </div>

  <script>
    (function() {
      const btn = document.getElementById("btn-submit");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirm-password");
      const errorEl = document.getElementById("error-msg");
      const successEl = document.getElementById("success-msg");

      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      btn.addEventListener("click", async () => {
        errorEl.textContent = "";
        successEl.textContent = "";

        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (!password || !confirm) {
          errorEl.textContent = "Please fill in both fields.";
          return;
        }

        if (password !== confirm) {
          errorEl.textContent = "Passwords do not match.";
          return;
        }

        if (!token) {
          errorEl.textContent = "Invalid or missing token.";
          return;
        }

        btn.disabled = true;

        try {
          const res = await fetch("http://localhost:3000/api/auth/set-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password })
          });

          const data = await res.json();

          if (!res.ok) {
            errorEl.textContent = data.error || "Failed to set password.";
          } else {
            successEl.textContent = data.message || "Password set successfully!";
            setTimeout(() => {
              window.location.href = "index.html";
            }, 2000);
          }
        } catch (err) {
          errorEl.textContent = "Could not reach server.";
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
